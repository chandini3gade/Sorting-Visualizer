<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Sorting Visualizer</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      text-align: center;
    }

    h1 {
      margin-bottom: 15px;
      color: #111827;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    button, select, input {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    #array {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      height: 420px;
      gap: 4px;
      margin-top: 20px;
      padding: 12px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .bar {
      width: 24px;
      background: #3b82f6;
      border-radius: 4px 4px 0 0;
      transition: height 0.25s ease, background 0.25s ease;
    }

    .info {
      margin-top: 10px;
      font-weight: bold;
      color: #111827;
    }
  </style>
</head>
<body>

  <h1>Sorting Visualizer</h1>

  <div class="controls">
    <button onclick="generateArray()">Generate New Array</button>

    <select id="algorithm">
      <option value="bubble">Bubble Sort</option>
      <option value="insertion">Insertion Sort</option>
      <option value="selection">Selection Sort</option>
      <option value="merge">Merge Sort</option>
    </select>

    

    <button onclick="startSort()">Start Sorting</button>
  </div>

  <div class="info" id="status">Ready</div>
  <div id="array"></div>

  <script>
    let values = [];
    const container = document.getElementById("array");
    const statusText = document.getElementById("status");

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function getSpeed() {
      return 500;
    }

    function generateArray() {
      values = [120, 80, 200, 60, 150, 90, 250, 40, 180, 110, 140, 70];
      container.innerHTML = "";
      statusText.innerText = "Array Generated";

      for (let i = 0; i < values.length; i++) {
        const bar = document.createElement("div");
        bar.classList.add("bar");
        bar.style.height = `${values[i]}px`;
        container.appendChild(bar);
      }
    }

    function updateBars(active = [], sorted = []) {
      const bars = document.querySelectorAll(".bar");

      bars.forEach((bar, index) => {
        bar.style.height = `${values[index]}px`;

        if (sorted.includes(index)) {
          bar.style.background = "#16a34a";
        } else if (active.includes(index)) {
          bar.style.background = "#ef4444";
        } else {
          bar.style.background = "#3b82f6";
        }
      });
    }

    async function bubbleSort() {
      for (let i = 0; i < values.length; i++) {
        for (let j = 0; j < values.length - i - 1; j++) {
          statusText.innerText = `Comparing index ${j} and ${j + 1}`;
          updateBars([j, j + 1]);
          await sleep(getSpeed());

          if (values[j] > values[j + 1]) {
            statusText.innerText = `Swapping ${values[j]} and ${values[j + 1]}`;
            [values[j], values[j + 1]] = [values[j + 1], values[j]];
            updateBars([j, j + 1]);
            await sleep(getSpeed());
          }
        }
      }
    }

    async function insertionSort() {
      for (let i = 1; i < values.length; i++) {
        let key = values[i];
        let j = i - 1;

        while (j >= 0 && values[j] > key) {
          statusText.innerText = `Comparing index ${j} and ${j + 1}`;
          updateBars([j, j + 1]);
          await sleep(getSpeed());
          values[j + 1] = values[j];
          j--;
        }

        values[j + 1] = key;
        updateBars([j + 1]);
        await sleep(getSpeed());
      }
    }

    async function mergeSort(start = 0, end = values.length - 1) {
      if (start >= end) return;

      const mid = Math.floor((start + end) / 2);
      await mergeSort(start, mid);
      await mergeSort(mid + 1, end);
      await merge(start, mid, end);
    }

    async function merge(start, mid, end) {
      let left = values.slice(start, mid + 1);
      let right = values.slice(mid + 1, end + 1);

      let i = 0, j = 0, k = start;

      while (i < left.length && j < right.length) {
        updateBars([k]);
        await sleep(getSpeed());

        if (left[i] <= right[j]) {
          values[k] = left[i];
          i++;
        } else {
          values[k] = right[j];
          j++;
        }
        k++;
      }

      while (i < left.length) {
        updateBars([k]);
        await sleep(getSpeed());
        values[k] = left[i];
        i++;
        k++;
      }

      while (j < right.length) {
        updateBars([k]);
        await sleep(getSpeed());
        values[k] = right[j];
        j++;
        k++;
      }

      updateBars();
    }

    async function selectionSort() {
      for (let i = 0; i < values.length; i++) {
        let minIndex = i;

        for (let j = i + 1; j < values.length; j++) {
          updateBars([minIndex, j]);
          await sleep(getSpeed());

          if (values[j] < values[minIndex]) {
            minIndex = j;
          }
        }

        [values[i], values[minIndex]] = [values[minIndex], values[i]];
        statusText.innerText = `Placing minimum value at position ${i}`;
        updateBars([i, minIndex]);
        await sleep(getSpeed());
      }
    }

    async function startSort() {
      const algo = document.getElementById("algorithm").value;
      statusText.innerText = "Sorting Started... Follow each comparison and swap step carefully.";

      if (algo === "bubble") {
        await bubbleSort();
      } else if (algo === "insertion") {
        await insertionSort();
      } else if (algo === "selection") {
        await selectionSort();
      } else if (algo === "merge") {
        await mergeSort();
      }

      updateBars([], values.map((_, i) => i));
      statusText.innerText = "Sorting Completed";
      alert("Sorting Completed Successfully");
    }

    generateArray();
  </script>

</body>
</html>
